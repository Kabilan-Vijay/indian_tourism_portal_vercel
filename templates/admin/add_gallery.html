{% extends "base.html" %}

{% block content %}

<div class="admin-page">
  <div class="admin-card">
    <h2>Add Gallery Image</h2>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data" class="admin-form">
      <div class="form-group">
        <label for="place">Choose a Place</label>
        <select name="place" id="place" required>
          <option value="" disabled selected>Select a place</option>
          {% for place in places %}
            <option value="{{ place.id }}">{{ place.place_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="image_file">Upload Image File</label>
        <input type="file" id="image_file" name="image_file" accept="image/*" onchange="updateFilename()">
        <small class="hint">Select an image file to upload</small>
      </div>

      <div class="form-group">
        <label for="image_filename">Image Filename (required)</label>
        <input type="text" id="image_filename" name="image_filename" placeholder="e.g., taj_mahal_1.jpg" required>
        <small class="hint">Enter the desired filename for the image (will be saved with this name)</small>
      </div>

      <div class="form-group preview-group" id="previewGroup" hidden>
        <label>Preview</label>
        <img id="previewImage" class="image-preview" src="" alt="Selected image preview">
      </div>

      <button type="submit" class="btn">Add to Gallery</button>
    </form>
  </div>
</div>

<script>
const fileInput = document.getElementById('image_file');
const previewGroup = document.getElementById('previewGroup');
const previewImage = document.getElementById('previewImage');
const filenameInput = document.getElementById('image_filename');

function updateFilename() {
    const file = fileInput.files[0];
    if (file) {
        // Get the original filename and make it safe
        let filename = file.name.toLowerCase();
        // Replace spaces with underscores and remove special characters
        filename = filename.replace(/\s+/g, '_').replace(/[^a-z0-9_.-]/g, '');
        // Set the filename input
        filenameInput.value = filename;
        // Show preview
        showPreview(file);
    }
}

function showPreview(file) {
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            previewImage.src = e.target.result;
            previewGroup.hidden = false;
        };
        reader.readAsDataURL(file);
    } else {
        previewGroup.hidden = true;
        previewImage.src = '';
    }
}

// Also handle manual filename input changes
filenameInput.addEventListener('input', function() {
    // Clear file input if user types a custom filename (for existing files)
    if (this.value.trim() && fileInput.files.length > 0) {
        fileInput.value = '';
        previewGroup.hidden = true;
    }
});

// Form validation
document.querySelector('.admin-form').addEventListener('submit', function(e) {
    const fileInput = document.getElementById('image_file');
    const filenameInput = document.getElementById('image_filename');
    const hasFile = fileInput.files.length > 0;
    const hasFilename = filenameInput.value.trim().length > 0;

    if (hasFile && !hasFilename) {
        e.preventDefault();
        alert('Please provide a filename for the uploaded image.');
        filenameInput.focus();
        return;
    }

    if (!hasFile && !hasFilename) {
        e.preventDefault();
        alert('Please either upload a file with a filename or enter an existing filename.');
        fileInput.focus();
        return;
    }

    // Validate filename format
    const filename = filenameInput.value.trim();
    if (filename && !/^[a-zA-Z0-9_.-]+$/.test(filename)) {
        e.preventDefault();
        alert('Filename can only contain letters, numbers, underscores, hyphens, and dots.');
        filenameInput.focus();
        return;
    }
});
</script>

{% endblock %}
