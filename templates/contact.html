{% extends "base.html" %}

{% block content %}

<div class="contact-container">
    <div class="contact-header">
        <h2 class="contact-title">Get In Touch</h2>
        <p class="contact-subtitle">We'd love to hear from you. Send us a message!</p>
    </div>

    <div class="contact-wrapper">
        <div class="contact-info">
            <div class="info-box">
                <div class="info-icon">📧</div>
                <h3>Email</h3>
                <p>hello@incredibleindia.com</p>
            </div>

            <div class="info-box">
                <div class="info-icon">📱</div>
                <h3>Phone</h3>
                <p>+91-XXXX-XXXX-XX</p>
            </div>

            <div class="info-box">
                <div class="info-icon">📍</div>
                <h3>Location</h3>
                <p>New Delhi, India</p>
            </div>
        </div>

        <div class="contact-form-wrapper">
            <form method="POST" class="contact-form" id="contactForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    <span class="form-icon">👤</span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <span class="form-icon">📧</span>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Tell us what you think..." rows="6" required></textarea>
                    <span class="form-icon textarea-icon">💬</span>
                </div>

                <button type="submit" class="submit-btn">
                    <span class="btn-text">Send Message</span>
                    <span class="btn-icon">→</span>
                </button>
            </form>

            <div class="form-message" id="formMessage"></div>
        </div>
    </div>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
    const messageDiv = document.getElementById('formMessage');
    setTimeout(() => {
        messageDiv.textContent = 'Thank you! Your message has been sent successfully. We will get back to you soon.';
        messageDiv.classList.add('success');
        messageDiv.style.display = 'block';
    }, 300);
});
</script>

{% endblock %}
